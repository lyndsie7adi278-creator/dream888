<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>WBC 戰利品商城 | 夢工廠</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --p: #38bdf8; --wbc-coin: #818cf8; --gold: #f59e0b; }
        body { margin: 0; background: var(--bg); font-family: 'PingFang TC', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        
        /* 導覽列 */
        .nav { width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .back-btn { color: #94a3b8; text-decoration: none; font-weight: bold; }
        .bal-badge { background: rgba(56,189,248,0.05); border: 1px solid #334155; padding: 5px 15px; border-radius: 50px; font-weight: 900; font-size: 1rem; color: var(--wbc-coin); }
        
        .container { width: 94%; max-width: 500px; margin-top: 20px; }
        .header-title { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(245,158,11,0.3); }
        .header-sub { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; }

        /* 商品列表格 */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .s-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; overflow: hidden; text-align: center; display: flex; flex-direction: column; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .s-img { width: 100%; aspect-ratio: 1/1; background: rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; font-size: 3.5rem; border-bottom: 1px solid #334155;}
        .s-info { padding: 15px 12px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .s-name { font-size: 0.95rem; font-weight: bold; color: #fff; margin-bottom: 5px; line-height: 1.3;}
        .s-desc { font-size: 0.75rem; color: #94a3b8; margin-bottom: 10px; }
        .s-price { color: var(--wbc-coin); font-weight: 900; font-size: 1.1rem; margin-bottom: 12px; }
        .btn-buy { background: linear-gradient(135deg, var(--wbc-coin), #6366f1); color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; width: 100%; cursor: pointer; transition:0.2s;}
        .btn-buy:active { transform: scale(0.95); }

        #loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:999; align-items:center; justify-content:center; flex-direction:column; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--p); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading"><div class="spinner"></div><div style="margin-top:15px; font-weight:bold; color:#fff;">處理中...</div></div>

    <div class="nav">
        <a href="wbc.html" class="back-btn">⬅ 返回賽事</a>
        <div class="bal-badge">⚾ <span id="uWbc">---</span></div>
    </div>

    <div class="container">
        <div class="header-title">🎁 戰利品兌換商城</div>
        <div class="header-sub">使用賽事贏得的預測幣，兌換實體大獎！</div>
        
        <div class="shop-grid" id="shopContainer">
            <div style="grid-column: span 2; text-align: center; padding: 50px; color: #64748b;">連線載入商品中...</div>
        </div>
    </div>

    <script type="module" src="wbc_shop.js"></script>
</body>
</html>
