<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>夢工廠 | 結束營運公告</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background: #0f172a; 
            font-family: 'PingFang TC', sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        .card { 
            background: #1e293b; 
            border: 1px solid #475569; 
            border-radius: 20px; 
            padding: 40px 30px; 
            max-width: 450px; 
            width: 100%; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            position: relative; 
            overflow: hidden; 
            box-sizing: border-box;
        }
        .card::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: linear-gradient(90deg, #ef4444, #f59e0b); 
        }
        h1 { 
            color: #fca5a5; 
            font-size: 1.8rem; 
            margin: 0 0 20px 0; 
            font-weight: 900; 
        }
        p { 
            color: #cbd5e1; 
            font-size: 1rem; 
            line-height: 1.8; 
            margin-bottom: 15px; 
        }
        .highlight { 
            color: #fde047; 
            font-weight: bold; 
            background: rgba(253,224,71,0.1); 
            padding: 2px 6px; 
            border-radius: 4px; 
        }
        .info-box {
            background: rgba(0,0,0,0.3); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: left;
            margin-top: 20px;
            border: 1px solid #334155;
        }
        .info-title {
            color: #38bdf8;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-text {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .info-text:last-child {
            margin-bottom: 0;
        }
        .footer-text { 
            margin-top: 30px; 
            font-size: 0.95rem; 
            color: #fff; 
            border-top: 1px dashed #334155; 
            padding-top: 20px; 
            font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="card">
        <h1>🛑 夢工廠刮刮樂 停止營運公告</h1>
        <p>親愛的玩家您好，<br>感謝您這段時間以來對【夢工廠】的支持與陪伴！</p>
        <p>本網站已於 <span class="highlight">2026年4月15日 23:59</span> 結束所有刮刮樂活動，並已正式關閉登入與伺服器。</p>
        
        <div class="info-box">
            <div class="info-title">📦 關於獎品出貨</div>
            <div class="info-text">於關站前成功刮中的實體獎品（包含公仔、3C等），我們將會依序為您安排聯絡與出貨，保證發放完畢，請您放心等候。</div>
            
            <div class="info-title" style="color: #fca5a5;">⚠️ 關於點數結算</div>
            <div class="info-text">依先前站內公告，期限屆滿後，所有未使用的 P幣 已全數自動歸零結算。</div>
        </div>

        <div class="footer-text">
            夢工廠全體團隊 下台一鞠躬 ❤️<br>期待未來有緣再見！
        </div>
    </div>
</body>
</html>
